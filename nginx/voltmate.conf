# ==========================================================================
# VoltMate reverse-proxy notes for this Hetzner box.
#
# This box already runs a containerised reverse proxy (master-nginx on
# 80/443, see /opt/reverse-proxy). VoltMate ships its own internal nginx
# (voltmate-nginx, see docker-compose.yml) that fronts the frontend, API,
# and uploads on a single port — that's the only port VoltMate publishes.
#
#   1. Direct (default): reach VoltMate by IP:port — no config needed.
#        App -> http://SERVER_IP:${VOLTMATE_HTTP_PORT}
#
#   2. Domain-based: include the server block below in master-nginx (after
#      taking a timestamped backup of /opt/reverse-proxy/nginx.conf). Add
#      voltmate-network to /opt/reverse-proxy/docker-compose.yml's
#      master-nginx networks (it's already external:true there for the
#      other apps on this box), replace <domain>, then add TLS with certbot.
# ==========================================================================

upstream voltmate_app { server voltmate-nginx:80; }

server {
    listen 80;
    server_name voltmate.example.com;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://voltmate_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
