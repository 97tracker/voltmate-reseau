# Internal reverse proxy for the VoltMate stack itself (runs as the
# `voltmate-nginx` service). Routes:
#   /            -> voltmate-frontend (Next.js)
#   /api/        -> voltmate-backend (FastAPI, already prefixes its own routes with /api)
#   /uploads/    -> served directly from the shared volume (no need to hit the backend)
#   /healthz     -> static 200 for the container healthcheck

client_max_body_size 10m;

upstream voltmate_frontend { server voltmate-frontend:3000; }
upstream voltmate_backend  { server voltmate-backend:8000; }

server {
    listen 80;
    server_name _;

    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    location /uploads/ {
        alias /uploads/;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass         http://voltmate_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://voltmate_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
